name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check server syntax
        run: node --check server.js

      - name: Verify key files exist
        run: |
          test -f index.html
          test -f lithium-js/lithium.mjs
          test -f lithium-js/ultraworker.js
          test -f lithium-js/bareworker.js
          test -f lithium-js/scram/scramjet.all.js
          echo "All required files present."
